name: Auto-Update Tiers

# 1. When should the robot run?
on:
  schedule:
    - cron: '0 * * * *' # Runs every 0 hours automatically
  workflow_dispatch: # Adds a button so we can run it manually to test!

# 2. Give the robot permission to save files to your repository
permissions:
  contents: write

# 3. What should the robot do?
jobs:
  update-data:
    runs-on: ubuntu-latest # The robot uses a Linux computer

    steps:
    - name: Get the repository code
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install our tools
      run: pip install requests

    - name: Run the scraper script
      run: python tiers.py

    - name: Save the new JSON file back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robot"
        git add tiers.json
        git commit -m "Automated update of tiers.json" || exit 0
        git push
